name: Build and Deploy to Vercel

# 触发条件：当你向 main 分支推送代码，或者手动点击运行，或者拉取最新上游代码时
on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许你在 GitHub 页面上点按钮手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Ubuntu 构建机（7GB 内存）

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Bun 环境（LobeChat 官方推荐的包管理器）
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. 安装项目依赖（在 7GB 内存下肆无忌惮地安装）
      - name: Install dependencies
        run: bun install

      # 4. 全局安装 Vercel CLI
      - name: Install Vercel CLI
        run: bun add -g vercel

      # 5. 利用 GitHub 的强大性能进行生产环境打包（Pull 配置并编译）
      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        # 此时 LobeChat 要求的 8192MB 内存，GitHub 能够完美吃下并平稳编译！
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 6. 将编译好的轻量级成品直接上传发布到 Vercel
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
